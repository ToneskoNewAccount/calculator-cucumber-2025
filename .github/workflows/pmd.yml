# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: pmd

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

permissions:
  contents: read # for actions/checkout to fetch code

jobs:
  pmd-code-scan:
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
#      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    runs-on: ubuntu-latest
    needs: [maven]
    steps:
      - uses: actions/checkout@3b9b8c884f6b4bb4d5be2779c26374abadae0871
      - name: Set up JDK 23
        uses: actions/setup-java@799ee7c97e9721ef38d1a7e8486c39753b9d6102
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: 'maven'
      - name: Run PMD
        id: pmd
        uses: pmd/pmd-github-action@1e12f89d3b1f899c03c8053cf35ca345d9ee8194
        with:
          rulesets: |
            rulesets/java/quickstart.xml,
            rulesets/java/design.xml,
            rulesets/java/errorprone.xml,
            rulesets/java/security.xml
          sourcePath: 'src/main/java'
          analyzeModifiedFilesOnly: false
      - name: Fail build if there are violations
        if: steps.pmd.outputs.violations != 0
        run: exit 1
      - name: Generate Report Summary
        run: |
          echo '### PMD Static Analysis Report' >> $GITHUB_STEP_SUMMARY
          if [ -f target/pmd-report.xml ]; then
            echo '```xml' >> $GITHUB_STEP_SUMMARY
            cat target/pmd-report.xml | head -n 50 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo 'No PMD report found. Check workflow logs for details.' >> $GITHUB_STEP_SUMMARY
          fi
