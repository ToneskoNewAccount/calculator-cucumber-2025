name: pmd

on:
  workflow_run:
    workflows: ["Maven"]
    types:
      - completed

jobs:
  pmd:
    needs: maven
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up JDK
        uses: actions/setup-java@v2
        with:
          java-version: '23'

      - name: Run PMD
        run: mvn pmd:pmd
