name: continuous-reporting

on:
  workflow_run:
    workflows: ["Java CI with Maven"]
    types:
      - completed
  release:
    types:
      - published

permissions:
  contents: write # Needed to upload assets to the release

jobs:
  generate-report:
    name: Generate and Upload Report
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: 'maven'
      - name: Run tests
        run: mvn test
      - name: Ensure tests pass
        run: |
          if [ $? -ne 0 ]; then
            echo "Tests failed. Stopping release."
            exit 1
          fi
      - name: Generate JavaDoc
        run: mvn javadoc:javadoc
      - name: Generate Coverage Report
        run: mvn jacoco:report
      - name: Generate PMD Report
        run: mvn pmd:pmd
      - name: Archive reports
        run: |
          mkdir -p reports
          cp -r target/site/apidocs reports/javadoc
          cp target/site/jacoco/index.html reports/coverage.html
          cp target/site/pmd.html reports/pmd.html
          tar -czf reports.tar.gz reports
      - name: Upload report to release
        uses: softprops/action-gh-release@v1
        with:
          files: reports.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
